name: SwiftPay CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────
  #  Build & Test — Gateway
  # ─────────────────────────────
  build-gateway:
    name: Build & Test — Transaction Gateway
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: swiftpay_gateway
          POSTGRES_USER: swiftpay
          POSTGRES_PASSWORD: swiftpay123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U swiftpay"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        working-directory: transaction-gateway
        run: mvn compile -q

      - name: Run unit tests
        working-directory: transaction-gateway
        run: mvn test -q

      - name: Run integration tests (Testcontainers)
        working-directory: transaction-gateway
        run: mvn verify -Pintegration-test -q
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Build Docker image
        working-directory: transaction-gateway
        run: |
          docker build -t swiftpay/transaction-gateway:${{ github.sha }} .
          docker tag swiftpay/transaction-gateway:${{ github.sha }} swiftpay/transaction-gateway:latest

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-test-reports
          path: transaction-gateway/target/surefire-reports/

  # ─────────────────────────────
  #  Build & Test — Ledger
  # ─────────────────────────────
  build-ledger:
    name: Build & Test — Ledger Service
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: swiftpay_ledger
          POSTGRES_USER: swiftpay
          POSTGRES_PASSWORD: swiftpay123
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U swiftpay"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        working-directory: ledger-service
        run: mvn compile -q

      - name: Run unit tests
        working-directory: ledger-service
        run: mvn test -q

      - name: Build Docker image
        working-directory: ledger-service
        run: |
          docker build -t swiftpay/ledger-service:${{ github.sha }} .
          docker tag swiftpay/ledger-service:${{ github.sha }} swiftpay/ledger-service:latest

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ledger-test-reports
          path: ledger-service/target/surefire-reports/

  # ─────────────────────────────
  #  Build — Analytics Worker
  # ─────────────────────────────
  build-analytics:
    name: Build — Analytics Worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        working-directory: analytics-worker
        run: mvn compile -q

      - name: Run tests
        working-directory: analytics-worker
        run: mvn test -q

      - name: Build Docker image
        working-directory: analytics-worker
        run: docker build -t swiftpay/analytics-worker:${{ github.sha }} .

  # ─────────────────────────────
  #  E2E smoke test
  # ─────────────────────────────
  e2e-smoke:
    name: E2E Smoke Test (docker-compose)
    runs-on: ubuntu-latest
    needs: [build-gateway, build-ledger, build-analytics]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for gateway..."
          for i in {1..30}; do
            curl -sf http://localhost:8080/actuator/health && break || sleep 5
          done
          echo "Waiting for ledger..."
          for i in {1..30}; do
            curl -sf http://localhost:8081/actuator/health && break || sleep 5
          done

      - name: Smoke test — POST /v1/payments
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8080/v1/payments \
            -H "Content-Type: application/json" \
            -d '{"senderId":"user_001","receiverId":"user_002","amount":100.00,"currency":"INR"}')
          echo "Status code: $RESPONSE"
          [ "$RESPONSE" = "202" ] || (echo "Smoke test FAILED" && exit 1)

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
