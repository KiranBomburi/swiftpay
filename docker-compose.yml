services:

  # ─────────────────────────────────────────
  #  Infrastructure
  # ─────────────────────────────────────────

  postgres-gateway:
    image: postgres:16-alpine
    container_name: swiftpay-postgres-gateway
    environment:
      POSTGRES_DB: swiftpay_gateway
      POSTGRES_USER: swiftpay
      POSTGRES_PASSWORD: swiftpay123
    ports:
      - "5440:5432"
    volumes:
      - pg_gateway_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swiftpay -d swiftpay_gateway"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-ledger:
    image: postgres:16-alpine
    container_name: swiftpay-postgres-ledger
    environment:
      POSTGRES_DB: swiftpay_ledger
      POSTGRES_USER: swiftpay
      POSTGRES_PASSWORD: swiftpay123
    ports:
      - "5441:5432"
    volumes:
      - pg_ledger_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swiftpay -d swiftpay_ledger"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-analytics:
    image: postgres:16-alpine
    container_name: swiftpay-postgres-analytics
    environment:
      POSTGRES_DB: swiftpay_analytics
      POSTGRES_USER: swiftpay
      POSTGRES_PASSWORD: swiftpay123
    ports:
      - "5442:5432"
    volumes:
      - pg_analytics_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swiftpay -d swiftpay_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: swiftpay-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: swiftpay-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: swiftpay-kafka-ui
    depends_on:
      - kafka
    ports:
      - "9093:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: swiftpay-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  redis:
    image: redis:7-alpine
    container_name: swiftpay-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────
  #  Application Services
  # ─────────────────────────────────────────

  transaction-gateway:
    build:
      context: ./transaction-gateway
      dockerfile: Dockerfile
    container_name: swiftpay-gateway
    depends_on:
      postgres-gateway:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres-gateway
      DB_PORT: 5432
      DB_NAME: swiftpay_gateway
      DB_USER: swiftpay
      DB_PASS: swiftpay123
      KAFKA_BROKERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  ledger-service:
    build:
      context: ./ledger-service
      dockerfile: Dockerfile
    container_name: swiftpay-ledger
    depends_on:
      postgres-ledger:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres-ledger
      DB_PORT: 5432
      DB_NAME: swiftpay_ledger
      DB_USER: swiftpay
      DB_PASS: swiftpay123
      KAFKA_BROKERS: kafka:29092
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  analytics-worker:
    build:
      context: ./analytics-worker
      dockerfile: Dockerfile
    container_name: swiftpay-analytics
    depends_on:
      postgres-analytics:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres-analytics
      DB_PORT: 5432
      DB_NAME: swiftpay_analytics
      DB_USER: swiftpay
      DB_PASS: swiftpay123
      KAFKA_BROKERS: kafka:29092

volumes:
  pg_gateway_data:
  pg_ledger_data:
  pg_analytics_data:
